apiVersion: v1
kind: ServiceAccount
metadata:
  name: csi-volume-device-exporter
  labels:
    app.kubernetes.io/name: csi-volume-device-exporter
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: csi-volume-device-exporter
  labels:
    app.kubernetes.io/name: csi-volume-device-exporter
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: csi-volume-device-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: csi-volume-device-exporter
    spec:
      serviceAccountName: csi-volume-device-exporter
      automountServiceAccountToken: false
      hostPID: true
      tolerations:
        - operator: Exists
      containers:
        - name: exporter
          image: quay.io/csiaddons/k8s-volume-device-exporter:latest
          args:
            - --listen-address=:9091
            - --poll-interval=30s
            - --log-level=info
            - --kubelet-root=/var/lib/kubelet
          ports:
            - name: metrics
              containerPort: 9091
              protocol: TCP
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          securityContext:
            privileged: false
            readOnlyRootFilesystem: true
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            seLinuxOptions:
              level: "s0"
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: kubelet-csi-plugins
              mountPath: /host/kubelet/plugins/kubernetes.io/csi
              readOnly: true
            - name: kubelet-pods
              mountPath: /host/kubelet/pods
              readOnly: true
            - name: trident-tracking
              mountPath: /host/trident/tracking
              readOnly: true
            - name: host-proc
              mountPath: /host/proc
              readOnly: true
            - name: host-sys
              mountPath: /host/sys
              readOnly: true
      volumes:
        - name: kubelet-csi-plugins
          hostPath:
            path: /var/lib/kubelet/plugins/kubernetes.io/csi
        - name: kubelet-pods
          hostPath:
            path: /var/lib/kubelet/pods
        - name: trident-tracking
          hostPath:
            path: /var/lib/trident/tracking
            type: DirectoryOrCreate
        - name: host-proc
          hostPath:
            path: /proc
        - name: host-sys
          hostPath:
            path: /sys
