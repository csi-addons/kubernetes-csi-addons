apiVersion: v1
kind: ServiceAccount
metadata:
  name: csi-volume-device-exporter
  namespace: csi-addons-system
  labels:
    app.kubernetes.io/name: csi-volume-device-exporter
    app.kubernetes.io/managed-by: csi-addons
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: csi-volume-device-exporter
  namespace: csi-addons-system
  labels:
    app.kubernetes.io/name: csi-volume-device-exporter
    app.kubernetes.io/managed-by: csi-addons
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: csi-volume-device-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: csi-volume-device-exporter
        app.kubernetes.io/managed-by: csi-addons
    spec:
      serviceAccountName: csi-volume-device-exporter
      automountServiceAccountToken: false
      tolerations:
        - operator: Exists
      containers:
        - name: exporter
          image: quay.io/csiaddons/k8s-volume-device-exporter:latest
          args:
            - --listen-address=:9710
            - --poll-interval=30s
            - --log-level=info
          ports:
            - name: metrics
              containerPort: 9710
              protocol: TCP
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          securityContext:
            privileged: false
            readOnlyRootFilesystem: true
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            seLinuxOptions:
              level: "s0"
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: kubelet-root
              mountPath: /var/lib/kubelet
              readOnly: true
              mountPropagation: HostToContainer
            - name: trident-tracking
              mountPath: /host/trident/tracking
              readOnly: true
            - name: host-sys
              mountPath: /host/sys
              readOnly: true
      volumes:
        - name: kubelet-root
          hostPath:
            path: /var/lib/kubelet
        - name: trident-tracking
          hostPath:
            path: /var/lib/trident/tracking
            type: DirectoryOrCreate
        - name: host-sys
          hostPath:
            path: /sys
